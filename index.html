          <p class="text-lg sm:text-xl font-medium text-[#666666] max-w-3xl mx-auto leading-relaxed">Translating the corporate blah-blah-blah so you don’t have to. What the f*ck does it mean in the real world?</p>

        <div id="frase-corporativa" class="text-xl sm:text-2xl md:text-3xl font-semibold text-black/85 bg-white border border-[#e0e0e0] py-10 px-5 sm:px-8 rounded-xl mb-8 w-full max-w-2xl text-center leading-relaxed break-words shadow-sm shadow-black/5">

        <div id="resultado" class="flex flex-col items-center space-y-4 mb-8 w-full max-w-2xl text-center min-h-[120px] border border-[#e0e0e0] bg-white rounded-xl px-4 py-7 shadow-sm shadow-black/5"></div>

      <div class="hidden lg:flex flex-col justify-start w-[160px] flex-none">
        <div class="flex flex-col justify-start items-center pt-8">
            <script type="text/javascript">
                atOptions = {

    <div id="ad-bottom" class="w-full bg-transparent flex items-center justify-center py-3 rounded-t mt-4"></div>

    <script>
      const frasesDiccionario = [
        {
          linkedin: "I’m passionate about supporting and mentoring the next generation of female leaders.",
          opciones: [
            "I’m into young girls",
            "I enjoy doing mansplaining",
            "I want to flirt in the office",
            "I’m a sociopath, but I can smile on cue"
          ],
          correcta: 0
        },
        {
          linkedin: "I'm excited to pivot my career and take on new challenges in a dynamic environment.",
          opciones: [
            "They canned me again",
            "I have no clue what I’m doing",
            "I hate my job but I’m acting enthusiastic",
            "They forced me to write this"
          ],
          correcta: 0
        },
        {
          linkedin: "We’re committed to leveraging synergy to deliver value-added solutions.",
          opciones: [
            "We have no idea what we’re selling",
            "We merged departments to fire people",
            "We just wanted to sound fancy",
            "Nobody understands what we’re saying"
          ],
          correcta: 1
        },
      ];

      let fraseActual, opcionesMezcladas, indiceCorrecto;
      let yaRespondido = false;

      const fraseEl = document.getElementById('frase-corporativa');
      const opcionesEl = document.getElementById('opciones');
      const resultadoEl = document.getElementById('resultado');

      function obtenerFraseAleatoria() {
        const idx = Math.floor(Math.random() * frasesDiccionario.length);
        return frasesDiccionario[idx];
      }

      function mezclarOpciones(arr) {
        const opciones = arr.map((v, i) => ({texto: v, index: i}));
        for (let i = opciones.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [opciones[i], opciones[j]] = [opciones[j], opciones[i]];
        }
        return opciones;
      }

      function mostrarNuevaPregunta() {
        yaRespondido = false;
        resultadoEl.innerHTML = "";
        fraseActual = obtenerFraseAleatoria();
        fraseEl.textContent = fraseActual.linkedin;

        opcionesMezcladas = mezclarOpciones(fraseActual.opciones);
        indiceCorrecto = opcionesMezcladas.findIndex(op => op.index === fraseActual.correcta);

        opcionesEl.innerHTML = '';
        opcionesMezcladas.forEach((opcion, i) => {
          const btn = document.createElement('button');
          btn.type = "button";
          btn.className =
            "rounded-full bg-white border border-[#e0e0e0] hover:border-[#0a66c2] hover:bg-[#eaf3ff] text-[#0a66c2] font-extrabold px-5 py-4 w-full transition-colors text-left text-base sm:text-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-[#0a66c2] focus-visible:ring-offset-2";
          btn.textContent = "🡆 "+opcion.texto;
          btn.onclick = () => responder(i, btn);
          opcionesEl.appendChild(btn);
        });
      }

      function responder(elegida, btn) {
        if (yaRespondido) return;
        yaRespondido = true;

        Array.from(opcionesEl.children).forEach((bot, i) => {
          if (i === indiceCorrecto) {
            bot.className =
              "rounded-full bg-[#ecfdf5] border border-[#22c55e]/40 text-[#166534] px-5 py-4 w-full transition-colors text-left text-base sm:text-lg shadow-sm shadow-black/5";
          } else if (i === elegida && i !== indiceCorrecto) {
            bot.className =
              "rounded-full bg-[#fef2f2] border border-[#ef4444]/40 text-[#991b1b] px-5 py-4 w-full transition-colors text-left text-base sm:text-lg shadow-sm shadow-black/5";
          } else {
            bot.className =
              "rounded-full bg-white border border-[#e0e0e0] text-[#666666] px-5 py-4 w-full opacity-70 transition-colors text-left text-base sm:text-lg";
          }
          bot.disabled = true;
          bot.style.cursor = "default";
        });

        const correcto = (elegida === indiceCorrecto);
        const msg = document.createElement('div');
        msg.className =
          "text-xl sm:text-2xl font-extrabold px-5 py-4 rounded-xl border border-[#e0e0e0] bg-white shadow-sm shadow-black/5 " +
          (correcto ? "text-[#166534] border-[#22c55e]/40 bg-[#ecfdf5]" : "text-[#991b1b] border-[#ef4444]/40 bg-[#fef2f2]");
        msg.textContent = correcto ? "✅ Boom! You’re officially a corporate cynic!" : "❌ Oof... you actually fell for that? Try again, rookie.";
        resultadoEl.innerHTML = "";
        resultadoEl.appendChild(msg);

        const sig = document.createElement('button');
        sig.className = "bg-[#0a66c2] hover:bg-[#095aa0] text-white font-extrabold text-lg py-3 px-8 mt-4 rounded-full transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-[#0a66c2] focus-visible:ring-offset-2";
        sig.textContent = "Next Load of Crap →";
        sig.onclick = mostrarNuevaPregunta;
        resultadoEl.appendChild(sig);

        const viral = document.createElement('a');
        const fraseTxt = encodeURIComponent('"'+fraseActual.linkedin+'" (Linked Off: The Corporate Bullshit Antidote)');
        // ENLACE ACTUALIZADO AL NUEVO DOMINIO:
        viral.href = `https://twitter.com/intent/tweet?text=${fraseTxt}&url=https://thelinkedoff.com`;
        viral.target = "_blank";
        viral.rel = "noopener";
        viral.className = "block mt-4 bg-[#0a66c2] hover:bg-[#095aa0] text-white font-extrabold px-6 py-3 rounded-full transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-[#0a66c2] focus-visible:ring-offset-2 flex items-center gap-2";
        viral.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-twitter-x" viewBox="0 0 16 16"><path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865l8.875 11.633Z"/></svg> Spread this corporate poison on X`;
        resultadoEl.appendChild(viral);
      }

      mostrarNuevaPregunta();
    </script>
